name: CD — Backend → Elastic Beanstalk

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

env:
  AWS_REGION:    eu-west-1
  S3_BUCKET:     ireland-rent-predictor
  EB_APP_NAME:   ireland-rent-backend
  EB_ENV_NAME:   ireland-rent-backend-env

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  deploy-backend:
    name: Deploy → Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Zip backend
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "tests/*" \
            --exclude ".env"

      - name: Upload zip to S3
        run: |
          VERSION="backend-$(date +%Y%m%d%H%M%S)-${{ github.sha }}"
          aws s3 cp backend-deploy.zip \
            s3://${{ env.S3_BUCKET }}/deployments/$VERSION.zip
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APP_NAME }} \
            --version-label ${{ env.VERSION }} \
            --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="deployments/${{ env.VERSION }}.zip" \
            --auto-create-application

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-name ${{ env.EB_ENV_NAME }} \
            --version-label ${{ env.VERSION }}

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-names ${{ env.EB_ENV_NAME }}

      - name: Done
        run: echo "Backend deployed to Elastic Beanstalk"